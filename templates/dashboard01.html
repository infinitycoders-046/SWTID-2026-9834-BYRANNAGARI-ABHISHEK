<!DOCTYPE html>
<html>
<head>
    <title>Dashboard 01</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        html, body {
            height: 100%;
            margin: 0;
            overflow: hidden; /* prevents scroll */
        }

        #vizDashboard1 {
            width: 100vw;
            height: 100vh;
        }

        .tableauPlaceholder {
            width: 100vw;
            height: 100vh;
        }

        .tableauViz {
            width: 100% !important;
            height: 100% !important;
        }

        /* If navbar exists, reduce height automatically */
        body {
            padding-top: 60px; /* adjust based on navbar height */
        }
    </style>
</head>

<body>

{% include 'navbar.html' %}

<div class="tableauPlaceholder" id="vizDashboard1">
    <object class="tableauViz">
        <param name="host_url" value="https%3A%2F%2Fpublic.tableau.com%2F" />
        <param name="embed_code_version" value="3" />
        <param name="site_root" value="" />
        <param name="name" value="FoodOrderingBehaviourandConsumerTrendsAStructuredAnalysisofChoicesandHabits-Dashboard1/Dashboard1" />
        <param name="tabs" value="no" />
        <param name="toolbar" value="yes" />
    </object>
</div>

<script>
    var divElement = document.getElementById('vizDashboard1');
    var vizElement = divElement.getElementsByTagName('object')[0];

    vizElement.style.width = '100%';
    vizElement.style.height = '100%';

    var scriptElement = document.createElement('script');
    scriptElement.src = 'https://public.tableau.com/javascripts/api/viz_v1.js';
    vizElement.parentNode.insertBefore(scriptElement, vizElement);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
